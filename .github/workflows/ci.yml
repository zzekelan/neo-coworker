name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  minimal:
    name: Minimal checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run focused test suite
        run: >
          bun test
          test/runtime/permission-flow.test.ts
          test/runtime/loop.test.ts
          test/runtime/context.test.ts
          test/runtime/observability.test.ts
          test/runtime/subsession-isolation.test.ts
          test/orchestration/step-service-tool-permission-check.test.ts
          test/orchestration/tool-executor.test.ts
          test/desktop/timeline-mapper.test.ts

      - name: Run structure checks
        run: bun run test:structure
